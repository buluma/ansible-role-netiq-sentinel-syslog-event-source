---
#
# Ansible managed
#
dependency:
  name: galaxy
  options:
    role-file: requirements.yml
    requirements-file: requirements.yml
lint: |
  set -e
  yamllint .
  ansible-lint
driver:
  name: docker
platforms:
  # Shortened prefix (not the full role name): the combined container name
  # (role name + "-docker-molecule-images-" + tag) exceeded Linux's 64-char
  # hostname limit for this role's unusually long name, causing docker to
  # fail with "sethostname: invalid argument" on every platform.
  - name: "netiq-sentinel-${image:-fedora}-${tag:-latest}"
    image: "${namespace:-buluma}/${image:-fedora}:${tag:-latest}"
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
verifier:
  name: ansible
